<app-round-button class="header-btn brand-btn" [active]="isActive('/home')" (clicked)="go('/home')">
  <app-icon name="drink" [size]="24" ariaLabel="Cocktails" />
  <span class="brand-text">Cocktails</span>
</app-round-button>

<nav class="header-nav">
  <app-round-button
    class="header-btn"
    [active]="isActive('/cocktails')"
    (clicked)="go('/cocktails')"
  >
    <app-icon name="list" [size]="18" ariaLabel="Liste des cocktails" />
  </app-round-button>

  <app-square-button
    class="header-btn cart-btn"
    [active]="showCartDialog()"
    [iconOnly]="true"
    (clicked)="toggleCartDialog()"
  >
    <span class="cart-square" aria-hidden="true"></span>
    <app-icon name="cart" [size]="20" ariaLabel="Panier" />
    @if (likedCount() > 0) {
      <span class="cart-badge">{{ likedCount() }}</span>
    }
  </app-square-button>
</nav>

@if (showCartDialog()) {
  <div class="cart-dialog-backdrop" (click)="closeCartDialog()">
    <div class="cart-dialog card" (click)="$event.stopPropagation()">
      <div class="cart-dialog__head">
        <h3>Cart</h3>
        <app-round-button [iconOnly]="true" (clicked)="closeCartDialog()">
          <app-icon name="xmark-solid-full" [size]="14" ariaLabel="Fermer" />
        </app-round-button>
      </div>
      <app-cart
        [cocktails]="likedCocktails()"
        (cocktailSelected)="onCartCocktailSelected($event)"
        (unlikeCocktail)="onUnlikeCocktail($event)"
      />
    </div>
  </div>
}
