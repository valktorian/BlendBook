<form class="add-cocktail-form" [formGroup]="form" (submit)="$event.preventDefault(); submit()">
  <h3 class="add-cocktail-form__title">Ajouter un cocktail</h3>

  <div class="add-cocktail-form__grid">
    <app-input
      label="Nom"
      placeholder="Ex: Negroni"
      [required]="true"
      formControlName="name"
    />

    <app-input
      label="Image URL"
      placeholder="https://..."
      type="url"
      [required]="true"
      formControlName="imageUrl"
    />

    <app-input
      label="Categorie"
      placeholder="Ex: Contemporary Classics"
      formControlName="category"
    />

    <app-input
      label="Verre"
      placeholder="Ex: Old Fashioned Glass"
      formControlName="glass"
    />

    <label class="add-cocktail-form__toggle">
      <input type="checkbox" formControlName="alcoholic" />
      <span>Alcoolise</span>
    </label>
  </div>

  <app-input
    label="Instructions"
    placeholder="Ex: Stir ingredients with ice, strain into chilled glass..."
    [required]="true"
    [multiline]="true"
    [rows]="4"
    formControlName="instructions"
  />

  <app-input
    label="Description"
    placeholder="Une courte description du cocktail"
    [multiline]="true"
    [rows]="3"
    formControlName="description"
  />

  <app-input
    label="Ingredients"
    placeholder="Gin, Campari, Sweet Vermouth"
    [required]="true"
    formControlName="ingredientsText"
  />

  <app-input
    label="Tags"
    placeholder="Bitter, Aperitif, Classic"
    formControlName="tagsText"
  />

  <div class="add-cocktail-form__actions">
    <app-round-button class="add-btn" [class.is-disabled]="!isValid" (clicked)="submit()">
      @if (isSaveAction()) {
        <app-icon name="save" [size]="20" ariaLabel="Enregistrer" />
      }
      {{ submitLabel() }}
    </app-round-button>
  </div>
</form>
