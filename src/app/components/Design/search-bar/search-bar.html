<div class="search-wrap">
  <input
    type="text"
    class="search-input"
    [placeholder]="placeholder()"
    [value]="query()"
    (input)="onInput($event)"
    (keydown.enter)="submit()"
  />
  <app-icon
    class="search-btn"
    name="magnifying-glass-solid-full"
    [size]="25"
    ariaLabel="Rechercher"
    (click)="submit()"
  />
</div>
